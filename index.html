<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Timer</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: system-ui, sans-serif;
      text-align: center; 
      padding: 1rem;
      background: #000000;
      color: #ffffff;
      margin: 0;
      user-select: none;
    }
    .card {
      background: #000000;
      padding: 2rem 1rem;
      border-radius: 24px;
      max-width: 400px;
      margin: 1rem auto;
      border: 1px solid #111111;
      position: relative;
      min-height: 500px;
    }
    body.dark-mode .card {
      border: none;
      margin: 0;
      border-radius: 0;
      max-width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0;
    }
    .toggle-ui {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #111;
      border: 1px solid #333;
      color: #666;
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      padding: 0;
      line-height: 40px;
    }
    .toggle-ui:active { background: #222; transform: scale(0.9); }
    body.dark-mode .toggle-ui {
      opacity: 0.4;
      border-color: #222;
    }
    .section-counter {
      transition: all 0.3s;
    }
    body.dark-mode .section-counter {
      display: none;
    }
    h2 { 
      margin: 0 0 1.2rem 0; 
      font-size: 12px;
      color: #444;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    body.dark-mode h2,
    body.dark-mode hr,
    body.dark-mode .controls,
    body.dark-mode .settings {
      display: none;
    }
    button {
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 16px;
      margin: 0.35rem;
      font-weight: 700;
    }
    button:active { transform: scale(0.95); opacity: 0.8; }
    .btn-plus { background: #00695C; }
    .btn-minus { background: #1A237E; }
    .btn-reset { background: #263238; }
    .btn-start { background: #004D40; }
    .btn-stop { background: #283593; }
    .btn-beep { background: #01579B; }
    .value { 
      font-size: 80px; 
      font-weight: 200; 
      margin: 1rem 0; 
      line-height: 1;
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
    }
    body.dark-mode #timer {
      font-size: 120px;
      font-weight: 100;
      margin: 0;
    }
    hr {
      border: none;
      border-top: 1px solid #111111;
      margin: 2rem 0;
    }
    .settings {
      font-size: 13px;
      margin-top: 1.2rem;
      color: #666;
      line-height: 2.2;
    }
    input {
      width: 70px;
      background: #000000;
      border: 1px solid #222;
      color: #fff;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      font-size: 15px;
      margin: 0 5px;
      font-weight: 600;
    }
    input:focus { outline: none; border-color: #00695C; }
  </style>
</head>
<body>
  <div class="card">
    <button class="toggle-ui" id="toggleUI">◉</button>
    
    <div class="section-counter">
      <h2>Counter</h2>
      <div class="value" id="count">0</div>
      <div class="controls">
        <button class="btn-minus" id="btnMinus">-1</button>
        <button class="btn-plus" id="btnPlus">+1</button>
        <button class="btn-reset" id="btnResetCount">Reset</button>
      </div>
      <hr>
    </div>
    
    <h2>Cronometru</h2>
    <div class="value" id="timer">00:00</div>
    <div class="controls">
      <button class="btn-start" id="btnStart">Start</button>
      <button class="btn-stop" id="btnStop">Stop</button>
      <button class="btn-reset" id="btnResetTimer">Reset</button>
      <button class="btn-beep" id="btnBeep">Beep</button>
    </div>
    
    <div class="settings">
      Beep la <input type="number" id="beepInterval" value="60" min="1"> sec<br>
      Frecvență <input type="number" id="beepFreq" value="800" min="100" max="2000"> Hz
    </div>
  </div>

  <script>
    function saveData(key, val) {
      try { localStorage.setItem(key, val); } catch(e) {}
    }
    function loadData(key, defaultVal) {
      try { 
        var val = localStorage.getItem(key);
        return val !== null ? val : defaultVal;
      } catch(e) { return defaultVal; }
    }
    
    var darkMode = loadData('darkMode', 'false') === 'true';
    if (darkMode) document.body.classList.add('dark-mode');
    
    document.getElementById('toggleUI').onclick = function(e) {
      e.stopPropagation();
      darkMode = !darkMode;
      document.body.classList.toggle('dark-mode');
      saveData('darkMode', darkMode);
    };
    
    document.getElementById('timer').ondblclick = function(e) {
      e.stopPropagation();
      document.getElementById('toggleUI').click();
    };
    
    var num = parseInt(loadData('counter', '0'));
    var countEl = document.getElementById('count');
    countEl.innerHTML = num;
    
    function changeCount(val) {
      num = num + val;
      countEl.innerHTML = num;
      saveData('counter', num);
    }
    
    function resetCount() {
      num = 0;
      countEl.innerHTML = num;
      saveData('counter', num);
    }
    
    var startTimestamp = parseInt(loadData('timerStartTs', '0'));
    var pausedSeconds = parseInt(loadData('timerPaused', '0'));
    var lastBeepAt = parseInt(loadData('lastBeepAt', '0'));
    var timerInterval = null;
    var timerEl = document.getElementById('timer');
    var beepInput = document.getElementById('beepInterval');
    var beepFreqInput = document.getElementById('beepFreq');
    var audioCtx = null;
    
    beepInput.value = loadData('beepInterval', '60');
    beepFreqInput.value = loadData('beepFreq', '800');
    
    function getSeconds() {
      if (startTimestamp === 0) return pausedSeconds;
      var now = Math.floor(Date.now() / 1000);
      return pausedSeconds + (now - startTimestamp);
    }
    
    function formatTime(s) {
      var h = Math.floor(s / 3600);
      var m = Math.floor((s % 3600) / 60);
      var sec = s % 60;
      if (h > 0) {
        if (m < 10) m = '0' + m;
        if (sec < 10) sec = '0' + sec;
        return h + ':' + m + ':' + sec;
      }
      if (m < 10) m = '0' + m;
      if (sec < 10) sec = '0' + sec;
      return m + ':' + sec;
    }
    
    function updateDisplay() {
      var seconds = getSeconds();
      timerEl.innerHTML = formatTime(seconds);
      checkBeep(seconds);
    }
    
    function checkBeep(seconds) {
      var beepEvery = parseInt(beepInput.value) || 60;
      if (seconds > 0 && seconds % beepEvery === 0 && seconds !== lastBeepAt) {
        beep();
        lastBeepAt = seconds;
        saveData('lastBeepAt', seconds);
      }
    }
    
    function startTimer() {
      if (timerInterval) return;
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
      }
      if (audioCtx) audioCtx.resume();
      
      startTimestamp = Math.floor(Date.now() / 1000);
      saveData('timerStartTs', startTimestamp);
      saveData('timerPaused', pausedSeconds);
      
      timerInterval = setInterval(updateDisplay, 250);
      updateDisplay();
    }
    
    function stopTimer() {
      if (!timerInterval) return;
      clearInterval(timerInterval);
      timerInterval = null;
      pausedSeconds = getSeconds();
      startTimestamp = 0;
      saveData('timerStartTs', 0);
      saveData('timerPaused', pausedSeconds);
      updateDisplay();
    }
    
    function resetTimer() {
      stopTimer();
      pausedSeconds = 0;
      lastBeepAt = 0;
      saveData('timerPaused', 0);
      saveData('timerStartTs', 0);
      saveData('lastBeepAt', 0);
      updateDisplay();
    }
    
    function beep() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { return; }
      }
      var freq = parseInt(beepFreqInput.value) || 800;
      try {
        var osc = audioCtx.createOscillator();
        var gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } catch(e) {}
      if (navigator.vibrate) {
        try { navigator.vibrate(200); } catch(e) {}
      }
    }
    
    function testBeep() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { return; }
      }
      audioCtx.resume();
      beep();
    }
    
    window.onload = function() {
      document.getElementById('btnMinus').onclick = function() { changeCount(-1); };
      document.getElementById('btnPlus').onclick = function() { changeCount(1); };
      document.getElementById('btnResetCount').onclick = resetCount;
      document.getElementById('btnStart').onclick = startTimer;
      document.getElementById('btnStop').onclick = stopTimer;
      document.getElementById('btnResetTimer').onclick = resetTimer;
      document.getElementById('btnBeep').onclick = testBeep;
      
      beepInput.onchange = function() { saveData('beepInterval', beepInput.value); };
      beepFreqInput.onchange = function() { saveData('beepFreq', beepFreqInput.value); };
      
      if (startTimestamp !== 0) {
        timerInterval = setInterval(updateDisplay, 250);
      }
      updateDisplay();
    };
    
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) updateDisplay();
    });
  </script>
</body>
</html>
